# Font Configuration
font_size 12.0
font_family       Cousine
bold_font         auto
italic_font       auto
bold_italic_font  auto

# Nerd Font icon ranges → Symbols Nerd Font Mono
symbol_map U+23FB-U+23FE,U+2B58 Symbols Nerd Font Mono
symbol_map U+E000-U+E00A Symbols Nerd Font Mono
symbol_map U+E0A0-U+E0A3,U+E0B0-U+E0D4 Symbols Nerd Font Mono
symbol_map U+E200-U+E2A9 Symbols Nerd Font Mono
symbol_map U+E300-U+E3E3 Symbols Nerd Font Mono
symbol_map U+E5FA-U+E6B7 Symbols Nerd Font Mono
symbol_map U+E700-U+E7C5 Symbols Nerd Font Mono
symbol_map U+EA60-U+EC1E Symbols Nerd Font Mono
symbol_map U+ED00-U+EFC1 Symbols Nerd Font Mono
symbol_map U+F000-U+F2E0 Symbols Nerd Font Mono
symbol_map U+F300-U+F381 Symbols Nerd Font Mono
symbol_map U+F400-U+F533 Symbols Nerd Font Mono
symbol_map U+F0001-U+F1AF0 Symbols Nerd Font Mono

# Emoji ranges → Noto Color Emoji
symbol_map U+1F300-U+1F5FF,U+1F600-U+1F64F,U+1F680-U+1F6FF Noto Color Emoji
symbol_map U+1F700-U+1F9FF,U+1FA00-U+1FAFF Noto Color Emoji
symbol_map U+2600-U+26FF,U+2700-U+27BF Noto Color Emoji

# Window Configuration
window_padding_width 5
background_opacity 0.75
hide_window_decorations yes

# Cursor Configuration
cursor_shape block
cursor_blink_interval 1

# Scrollback
scrollback_lines 3000

# Terminal features
copy_on_select yes
strip_trailing_spaces smart

# Key bindings for common actions
map ctrl+shift+n new_window
map ctrl+t new_tab
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

# Tab configuration
tab_bar_style powerline
tab_bar_align left

# Shell integration
shell_integration enabled

# Dank color generation
# include dank-tabs.conf # don't want it to look different
include dank-theme.conf

# Custom Extra
confirm_os_window_close 0
dynamic_background_opacity yes
allow_remote_control yes
listen_on unix:/tmp/kitty_nvim_fix
